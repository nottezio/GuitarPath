  // Find a matching voicing in the Kamus Chord library for a token, else build one from theory
  diagramForToken(tok){
    // normalize: "Em/G" -> try "Em" (ignore bass for shape), flats -> sharps
    let base=tok.split("/")[0];
    const m=base.match(/^([A-G][#b]?)(.*)$/);
    if(!m) return null;
    let root=m[1], rest=m[2]||"";
    if(FLAT_MAP[root]) root=FLAT_MAP[root];
    const norm=root+rest;
    // exact name match in library
    let entry=CHORDS.find(c=>c.n.toLowerCase()===norm.toLowerCase());
    if(!entry){
      // try common aliases: "C" major already, "Cmaj7" etc. Also try without "maj"
      entry=CHORDS.find(c=>c.n.toLowerCase()===norm.replace("maj","M").toLowerCase());
    }
    if(entry && typeof ChordDict!=="undefined") return ChordDict.diagram(entry.voicings[0]);
    return null;
  },
  showChordPopup(tok, anchor){
    document.querySelectorAll(".chord-popup").forEach(p=>p.remove());
    const svg=this.diagramForToken(tok);
    const pop=document.createElement("div");
    pop.className="chord-popup";
    pop.innerHTML=`<div class="cpop-name">${this.esc(tok)}</div>`
      + (svg ? `<div class="cpop-dia">${svg}</div>` : `<div class="cpop-none dim small">Diagram tidak tersedia di pustaka.<br>Nada tetap dibunyikan.</div>`)
      + `<button class="cpop-close" aria-label="Tutup">✕</button>`;
    document.body.appendChild(pop);
    // position near the anchor, clamped to viewport
    const r=anchor.getBoundingClientRect();
    const pw=pop.offsetWidth, ph=pop.offsetHeight;
    let left=r.left+window.scrollX, top=r.bottom+window.scrollY+6;
    if(left+pw>window.scrollX+window.innerWidth-8) left=window.scrollX+window.innerWidth-pw-8;
    if(left<8) left=8;
    if(r.bottom+ph>window.innerHeight-8){ top=r.top+window.scrollY-ph-6; } // flip above if no room
    pop.style.left=left+"px"; pop.style.top=top+"px";
    const close=()=>{ pop.remove(); document.removeEventListener("click",outside,true); };
    pop.querySelector(".cpop-close").onclick=close;
    const outside=(ev)=>{ if(!pop.contains(ev.target) && ev.target!==anchor) close(); };
    setTimeout(()=>document.addEventListener("click",outside,true),0);
  },
  // Parse ChordPro [C]text into HTML with chords above lyrics
  isTabLine(line){ return /^\s*[eEABDGgb]\s*\|/.test(line) && /[-0-9]/.test(line); },
  renderChordPro(body, semis){
    if(!body || !body.trim()) return `<div class="dim">Belum ada isi.</div>`;
    const lines=body.replace(/\r/g,"").split("\n");
    const out=[];
    for(let li=0; li<lines.length; li++){
      const line=lines[li];

      // ----- TAB block: gather consecutive tab lines and render as monospace -----
      if(this.isTabLine(line)){
        const tabLines=[];
        while(li<lines.length && this.isTabLine(lines[li])){ tabLines.push(lines[li]); li++; }
        li--; // step back; for-loop will increment
        const body=tabLines.map(l=>this.esc(l)).join("\n");
        out.push(`<div class="cp-tab"><pre>${body}</pre></div>`);
        continue;
      }

      if(line.trim()===""){ out.push(`<div class="cp-blank"></div>`); continue; }
      // section header {Verse}
      const sec=line.match(/^\s*\{(.+?)\}\s*$/);
      if(sec){ out.push(`<div class="cp-section">${this.esc(sec[1])}</div>`); continue; }

      // Parse into ordered segments of plain-text and [chord]
      const re=/\[([^\]]+)\]/g;
      let last=0, m; const segs=[];
      while((m=re.exec(line))!==null){
        if(m.index>last) segs.push({t:"text", v:line.slice(last,m.index)});
        segs.push({t:"chord", v:transposeChordToken(m[1],semis)});
        last=m.index+m[0].length;
      }
      if(last<line.length) segs.push({t:"text", v:line.slice(last)});

      // Is this a CHORD-ONLY line? (no lyric except a trailing annotation like x4/3:30)
      const lyricText = segs.filter(s=>s.t==="text").map(s=>s.v).join("");
      const lyricStripped = lyricText.replace(/\b(x\d+|\d+:\d+)\b/gi,"").trim();
      const hasLyric = lyricStripped!=="";
      if(!hasLyric){
        const chips=segs.filter(s=>s.t==="chord")
          .map(s=>`<span class="cp-chord cp-box" data-ch="${this.esc(s.v)}">${this.esc(s.v)}</span>`).join("");
        const annoTxt=lyricText.trim();
        const trailing=annoTxt?`<span class="cp-anno">${this.esc(annoTxt)}</span>`:"";
        out.push(`<div class="cp-chordrow">${chips}${trailing?" "+trailing:""}</div>`);
        continue;
      }

      // Mixed chord+lyric line: build aligned columns (chord sticks to following text)
      const cols=[];
      for(let i=0;i<segs.length;i++){
        const s=segs[i];
        if(s.t==="chord"){
          let txt=""; if(segs[i+1] && segs[i+1].t==="text"){ txt=segs[i+1].v; i++; }
          cols.push({chord:s.v, text:txt});
        } else if(s.v!==""){
          cols.push({chord:"", text:s.v});
        }
      }
      if(!cols.length){ out.push(`<div class="cp-line"></div>`); continue; }
      const inner=cols.map(c=>{
        const chordHtml=c.chord
          ? `<span class="cp-chord cp-box" data-ch="${this.esc(c.chord)}">${this.esc(c.chord)}</span>`
          : `<span class="cp-chord-empty">&nbsp;</span>`;
        let txt=this.esc(c.text).replace(/ /g,"&nbsp;");
        if(c.chord && c.text.trim()===""){ txt="&nbsp;"; }
        const textHtml=`<span class="cp-text">${txt||"&nbsp;"}</span>`;
        return `<span class="cp-col">${chordHtml}${textHtml}</span>`;
      }).join("");
      out.push(`<div class="cp-line">${inner}</div>`);
    }
    return out.join("");
  },
  playChordToken(tok){
    // derive root + simple quality, voice it
    const m=tok.split("/")[0].match(/^([A-G][#b]?)(.*)$/);
    if(!m) return;
    let root=m[1], rest=m[2]||"";
    if(FLAT_MAP[root]) root=FLAT_MAP[root];
    const pc=CHROMA_T.indexOf(root); if(pc<0) return;
    let iv=[0,4,7];
    if(/^m(?!aj)/.test(rest)) iv=[0,3,7];
    if(/dim/.test(rest)) iv=[0,3,6];
    if(/^7|^maj7|^m7/.test(rest)) iv=/maj7/.test(rest)?[0,4,7,11]:(/m7/.test(rest)?[0,3,7,10]:[0,4,7,10]);
    const bass=48, r=bass+(((pc-(bass%12))%12)+12)%12;
    Audio_.arpeggio(iv.map(i=>r+i),0.1);
  },
  exportBackup(){
    const data=JSON.stringify({app:"GuitarPath",type:"song-backup",version:1,exported:Date.now(),songs:this.songs},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`guitarpath-lagu-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },
  importBackup(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const parsed=JSON.parse(reader.result);
        const incoming=Array.isArray(parsed)?parsed:parsed.songs;
        if(!Array.isArray(incoming)) throw new Error("format");
        // merge by id; new ids if collision
        let added=0;
        incoming.forEach(s=>{
          if(!s.title) return;
          const id=s.id&&!this.songs.some(x=>x.id===s.id)?s.id:this.uid();
          this.songs.push({id,title:s.title,artist:s.artist||"",key:s.key||"",capo:s.capo||0,body:s.body||"",created:s.created||Date.now()});
          added++;
        });
        this.save(); this.mode="list"; this.routeBody();
        alert(added+" lagu berhasil diimpor.");
      }catch(err){ alert("File tidak valid. Pastikan ini file backup GuitarPath (.json)."); }
    };
    reader.readAsText(file);
    e.target.value="";
  },
  // ---- Chord-over-lyric importer (UG / Chordtela style) ----
  _chordTokenRe:/^\(?[A-G][#b]?(m|maj|min|dim|aug|sus|add|M)?\d*(sus\d)?(add\d)?(\/[A-G][#b]?)?\)?$/,
  // A genuine ChordPro chord bracket: [C] [Am7] [D/F#] — NOT a section header like [Bridge]
  _chordProBracket:/\[[A-G][#b]?(m|maj|min|dim|aug|sus|add|M)?\d*(sus\d)?(add\d)?(\/[A-G][#b]?)?\]/,
  isChordToken(t){ return this._chordTokenRe.test(t); },
  isChordLine(line){
    // tolerate trailing solo annotations: "x4", "3:30"
    let s=line.trim().replace(/\s+x\d+\s*$/i,"").replace(/\s+\d+:\d+\s*$/,"");
    const tokens=s.split(/\s+/).filter(Boolean);
    if(!tokens.length) return false;
    return tokens.every(t=>this.isChordToken(t));
  },
  isSectionHeader(line){
    return /^\s*\[[^\]]+\]/.test(line.trim()) && !this._chordProBracket.test(line);
  },
  // Does the pasted text look like chord-over-lyric (not already ChordPro)?
  looksLikeOverLyric(text){
    // "already ChordPro" only if there's a real chord bracket, not just [Verse]/[Chorus]
    if(this._chordProBracket.test(text)) return false;
    const lines=text.replace(/\r/g,"").split("\n");
    let chordLines=0;
    for(let i=0;i<lines.length;i++){
      if(this.isChordLine(lines[i]) && !this.isSectionHeader(lines[i])) chordLines++;
    }
    return chordLines>=1;
  },
  snapToWord(lyric,col){
    if(col>=lyric.length) return lyric.length;
    if(col<=0) return 0;
    if(lyric[col]!==" " && lyric[col-1]!==" "){
      let c=col; while(c>0 && lyric[c-1]!==" ") c--;
      return c;
    }
    return col;
  },
  pairToChordPro(chordLine, lyricLine){
    const placements=[]; const re=/\S+/g; let m;
    while((m=re.exec(chordLine))!==null) placements.push({col:m.index, chord:m[0]});
    const lyric=lyricLine; let out=""; let prev=0;
    for(const p of placements){
      if(p.col>=lyric.length){
        // chord sits past the end of the lyric (played without singing) -> keep it
        // as a spaced trailing chord rather than mashing onto the last word
        if(prev<lyric.length){ out+=lyric.slice(prev); prev=lyric.length; }
        out+="  ["+p.chord+"]";
      } else {
        let col=this.snapToWord(lyric, Math.min(p.col, lyric.length));
        if(col<prev) col=prev;
        out+=lyric.slice(prev,col)+"["+p.chord+"]";
        prev=col;
      }
    }
    if(prev<lyric.length) out+=lyric.slice(prev);
    return out;
  },
  convertOverLyric(text){
    const lines=text.replace(/\r/g,"").split("\n");
    const out=[];
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      // Section header, possibly with trailing annotation e.g. "[Solo] 3:30"
      if(this.isSectionHeader(line)){
        const inner=line.trim().replace(/^\[([^\]]+)\].*/, (s,h)=>{
          const annoMatch=line.trim().match(/^\[[^\]]+\]\s*(.+)$/);
          return annoMatch ? h+" "+annoMatch[1].trim() : h;
        });
        out.push("{"+inner+"}"); continue;
      }
      if(this._chordProBracket.test(line)){ out.push(line); continue; }
      if(line.trim()===""){ out.push(""); continue; }
      if(this.isChordLine(line)){
        const next=lines[i+1];
        const nextIsLyric = next!==undefined && next.trim()!=="" && !this.isChordLine(next)
          && !this.isSectionHeader(next) && !this._chordProBracket.test(next);
        const lyricMarker = nextIsLyric && /^\s*\([^)]*\)\s*$/.test(next.trim());
        if(nextIsLyric && !lyricMarker){
          out.push(this.pairToChordPro(line,next)); i++;
        } else {
          // chord-only line: keep chords bracketed, keep trailing annotation (x4, 3:30) as plain text
          const annoMatch=line.trim().match(/\s+(x\d+|\d+:\d+)\s*$/i);
          const anno=annoMatch?annoMatch[1]:"";
          const chordsPart=anno?line.trim().slice(0,line.trim().length-anno.length):line.trim();
          const bracketed=chordsPart.split(/\s+/).filter(Boolean).map(c=>this.isChordToken(c)?"["+c+"]":c).join(" ");
          out.push(bracketed+(anno?" "+anno:""));
        }
      } else {
        out.push(line);
      }
    }
    return out.join("\n");
  },
  esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
};
</script>
<script>
/* ============================================================
   MODULE: LATIHAN GENJRENG (strumming pattern trainer)
   Visual D/DU patterns synced to a Web Audio strum click.
   ============================================================ */
const Strum={
  bpm:80, playing:false, timer:null, stepIdx:0, patternId:0,
  // Each pattern: 8 slots (eighth notes in 4/4). d=down, u=up, "-"=skip (hand moves, no strike)
  patterns:[
    {name:"Dasar — Down tiap ketuk", slots:["d","-","d","-","d","-","d","-"]},
    {name:"Folk — D DU UDU", slots:["d","-","d","u","-","u","d","u"]},
    {name:"Pop — D D DU", slots:["d","-","d","-","d","u","-","-"]},
    {name:"Balada — D DU D DU", slots:["d","-","d","u","d","-","d","u"]},
    {name:"Reggae — Up off-beat", slots:["-","u","-","u","-","u","-","u"]},
    {name:"Rock — semua delapan", slots:["d","u","d","u","d","u","d","u"]},
  ],
  render(){
    const v=document.getElementById("view-strum");
    v.innerHTML = moduleHead("Modul 09 — Tangan Kanan","Latihan Genjreng",
      "Latih pola genjreng (strumming). Panah ke bawah = genjreng turun, ke atas = naik. Tangan kanan tetap bergerak konstan; slot kosong berarti tangan bergerak tanpa mengenai senar.")
      + `<div class="card strum-controls">
          <label>Pola
            <select id="stPattern">${this.patterns.map((p,i)=>`<option value="${i}">${p.name}</option>`).join("")}</select>
          </label>
          <label>Tempo <input type="number" id="stBpm" min="40" max="160" value="${this.bpm}"></label>
          <button class="btn btn-primary" id="stPlay">▶ Mulai</button>
        </div>
        <div class="strum-display card" id="strumDisplay"></div>
        <p class="dim small" style="margin-top:12px">Tips: hitung "1 &amp; 2 &amp; 3 &amp; 4 &amp;" — angka = ketukan turun, "&amp;" = naik. Mulai pelan, percepat bertahap.</p>`;
    document.getElementById("stPattern").onchange=e=>{ this.patternId=+e.target.value; this.stop(); this.drawPattern(-1); };
    document.getElementById("stBpm").oninput=e=>{ this.bpm=Math.max(40,Math.min(160,+e.target.value||80)); };
    document.getElementById("stPlay").onclick=()=>this.toggle();
    this.drawPattern(-1);
  },
  drawPattern(active){
    const p=this.patterns[this.patternId];
    const host=document.getElementById("strumDisplay");
    if(!host) return;
    const counts=["1","&","2","&","3","&","4","&"];
    host.innerHTML=`<div class="strum-row">`+p.slots.map((s,i)=>{
      const arrow = s==="d"?"↓" : s==="u"?"↑" : "";
      const cls = s==="-"?"empty":(s==="d"?"down":"up");
      return `<div class="strum-slot ${cls} ${i===active?'on':''}">
        <span class="ss-arrow">${arrow||"·"}</span>
        <span class="ss-count">${counts[i]}</span></div>`;
    }).join("")+`</div>`;
  },
  toggle(){ this.playing?this.stop():this.start(); },
  start(){
    Audio_.ensure();
    this.playing=true; this.stepIdx=0;
    document.getElementById("stPlay").textContent="■ Berhenti";
    document.getElementById("stPlay").classList.remove("btn-primary");
    document.getElementById("stPlay").classList.add("btn-blue");
    const p=this.patterns[this.patternId];
    const eighthMs=(60000/this.bpm)/2;
    const tick=()=>{
      if(!this.playing) return;
      const i=this.stepIdx % 8;
      const slot=p.slots[i];
      if(slot==="d") this.strumSound(true);
      else if(slot==="u") this.strumSound(false);
      this.drawPattern(i);
      this.stepIdx++;
      this.timer=setTimeout(tick,eighthMs);
    };
    tick();
  },
  stop(){
    this.playing=false;
    if(this.timer){ clearTimeout(this.timer); this.timer=null; }
    const b=document.getElementById("stPlay");
    if(b){ b.textContent="▶ Mulai"; b.classList.add("btn-primary"); b.classList.remove("btn-blue"); }
    this.drawPattern(-1);
  },
  // Down = lower-to-higher quick noise burst; Up = higher-to-lower. Synthesized.
  strumSound(down){
    const ctx=Audio_.ensure();
    const t0=ctx.currentTime;
    const notes=down?[40,45,50,55,59,64]:[64,59,55,50,45,40];
    notes.forEach((m,i)=>{
      const f=midiToFreq(m);
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type="sawtooth"; osc.frequency.value=f;
      const when=t0+i*0.012;
      g.gain.setValueAtTime(0.0001,when);
      g.gain.exponentialRampToValueAtTime(0.12,when+0.004);
      g.gain.exponentialRampToValueAtTime(0.0001,when+0.32);
      const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=2600;
      osc.connect(lp); lp.connect(g); g.connect(ctx.destination);
      osc.start(when); osc.stop(when+0.34);
    });
  }
};
</script>
<script>
/* ============================================================
   MODULE: KUIS (quiz engine — 4 categories, generated questions)
   ============================================================ */
const Quiz={
  active:null, idx:0, score:0, answered:false, questions:[],
  cats:[
    {id:"chord", label:"Chord & Strumming"},
    {id:"scale", label:"Scales & Soloing"},
    {id:"finger",label:"Fingerpicking"},
    {id:"theory",label:"Teori Musik"},
    {id:"ear_chord", label:"Latihan Telinga — Chord", ear:true},
    {id:"ear_interval", label:"Latihan Telinga — Interval", ear:true},
  ],
  render(){
    const v=document.getElementById("view-kuis");
    v.innerHTML = moduleHead("Modul 05 — Uji Pemahaman","Kuis",
      "Sepuluh soal acak per sesi. Jawaban salah disertai penjelasan. Lima skor terakhir tersimpan per kategori.")
      + `<div id="quizHome"></div><div id="quizPlay" style="display:none"></div>`;
    this.home();
  },
  home(){
    document.getElementById("quizPlay").style.display="none";
    const home=document.getElementById("quizHome"); home.style.display="block";
    home.innerHTML=`<div class="quiz-cats">`+this.cats.map(c=>{
      const hist=State.data.quiz[c.id]||[];
      const best=hist.length?Math.max(...hist.map(h=>h.score)):null;
      return `<div class="card quiz-cat">
        <h3>${c.label}</h3>
        <div class="quiz-hist">${hist.length?hist.map(h=>`<span class="pill">${h.score}/10</span>`).join(""):'<span class="dim">Belum ada riwayat</span>'}</div>
        ${best!==null?`<div class="dim small">Terbaik: ${best}/10</div>`:""}
        <button class="btn btn-primary" data-quiz="${c.id}">Mulai Kuis</button>
      </div>`;
    }).join("")+`</div>`;
    document.querySelectorAll("[data-quiz]").forEach(b=>b.addEventListener("click",()=>this.start(b.dataset.quiz)));
  },
  start(catId){
    this.active=catId; this.idx=0; this.score=0; this.answered=false;
    this.questions=this.generate(catId);
    document.getElementById("quizHome").style.display="none";
    const play=document.getElementById("quizPlay"); play.style.display="block";
    this.renderQ();
  },
  renderQ(){
    const play=document.getElementById("quizPlay");
    if(this.idx>=this.questions.length) return this.finish();
    const q=this.questions[this.idx];
    play.innerHTML=`<div class="card quiz-q">
      <div class="quiz-meta"><span>Soal ${this.idx+1}/${this.questions.length}</span><span>Skor: ${this.score}</span></div>
      <div class="bar quiz-bar"><i style="width:${this.idx/this.questions.length*100}%"></i></div>
      <h3 class="q-text">${q.q}</h3>
      ${q.audio?`<button class="btn btn-blue ear-play" id="earPlay">▶ Putar Suara</button>`:""}
      ${q.svg||""}
      <div class="opts">${q.opts.map((o,i)=>`<button class="opt" data-opt="${i}">${o}</button>`).join("")}</div>
      <div class="explain" id="explain" style="display:none"></div>
      <button class="btn btn-primary" id="nextQ" style="display:none">${this.idx+1<this.questions.length?'Lanjut':'Lihat Hasil'}</button>
    </div>`;
    play.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>this.answer(+b.dataset.opt)));
    document.getElementById("nextQ").addEventListener("click",()=>{this.idx++;this.answered=false;this.renderQ();});
    if(q.audio){
      const pb=document.getElementById("earPlay");
      pb.addEventListener("click",()=>q.audio());
      setTimeout(()=>q.audio(),250); // auto-play once on show
    }
  },
  answer(i){
    if(this.answered) return; this.answered=true;
    const q=this.questions[this.idx];
    document.querySelectorAll(".opt").forEach((b,idx)=>{
      b.disabled=true;
      if(idx===q.a) b.classList.add("correct");
      else if(idx===i) b.classList.add("wrong");
    });
    if(i===q.a) this.score++;
    const ex=document.getElementById("explain"); ex.style.display="block";
    ex.innerHTML=`${i===q.a?'<b class="ok">Benar.</b>':`<b class="bad">Salah.</b> Jawaban: <b>${q.opts[q.a]}</b>. `}${q.exp||""}`;
    document.querySelector(".quiz-meta").lastElementChild.textContent="Skor: "+this.score;
    document.getElementById("nextQ").style.display="inline-block";
  },
  finish(){
    State.addQuiz(this.active,this.score);
    const pct=this.score/this.questions.length;
    const badge = pct>=0.8?{t:"Luar Biasa",c:"var(--ok)"}: pct>=0.5?{t:"Cukup Baik",c:"var(--accent)"}:{t:"Perlu Latihan",c:"var(--bad)"};
    document.getElementById("quizPlay").innerHTML=`<div class="card quiz-result">
      <div class="result-badge" style="border-color:${badge.c};color:${badge.c}">${badge.t}</div>
      <div class="result-score">${this.score}<span>/${this.questions.length}</span></div>
      <p class="dim">Kategori: ${this.cats.find(c=>c.id===this.active).label}</p>
      <div class="result-actions">
        <button class="btn btn-primary" id="retryQ">Ulangi</button>
        <button class="btn" id="backQ">Kembali ke Kategori</button>
      </div></div>`;
    document.getElementById("retryQ").addEventListener("click",()=>this.start(this.active));
    document.getElementById("backQ").addEventListener("click",()=>this.home());
  },
  // ---- question generators ----
  shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;},
  pick(a){return a[Math.floor(Math.random()*a.length)];},
  mc(q,correct,distractors,exp,svg){
    const opts=this.shuffle([correct,...distractors]); 
    return {q,opts,a:opts.indexOf(correct),exp,svg};
  },
  generate(catId){
    const out=[]; const used=new Set();
    const guard=fn=>{let q,k,tries=0;do{q=fn();k=q.q+"|"+q.opts[q.a]+"|"+JSON.stringify(q.opts);tries++;}while(used.has(k)&&tries<12);used.add(k);return q;};
    const gens={
      chord:()=>{
        const c=this.pick(CHORDS.filter(x=>["open","barre","ext"].includes(x.cat)));
        const others=this.shuffle(CHORDS.filter(x=>x.n!==c.n)).slice(0,3).map(x=>x.n);
        return this.mc("Chord apa yang ditunjukkan diagram ini?",c.n,others,
          `Diagram menampilkan posisi jari untuk chord ${c.n}.`, `<div class="q-diagram">${ChordDict.diagram(c.voicings[0])}</div>`);
      },
      scale:()=>{
        const opts=[
          {q:"Tangga nada apa yang paling cocok untuk improvisasi blues?",a:"Blues / Pentatonik Minor",d:["Mayor Natural","Mode Lydian","Tangga nada kromatik penuh"],e:"Blues scale (pentatonik minor + b5) adalah pilihan utama untuk solo blues."},
          {q:"Nada tambahan apa yang membedakan blues scale dari pentatonik minor?",a:"b5 (blue note)",d:["b2","mayor 7","b6"],e:"Blue note (b5) menambah ketegangan khas blues sebagai passing tone."},
          {q:"Teknik apa yang menaikkan pitch dengan mendorong senar?",a:"Bending",d:["Palm mute","Slide","Tapping"],e:"Bend penuh menaikkan pitch sebesar 1 nada (2 fret)."},
          {q:"Hammer-on dan pull-off adalah dasar dari teknik apa?",a:"Legato",d:["Staccato","Tremolo","Sweep picking"],e:"Legato menyambung nada tanpa petik ulang setiap nada."},
        ];
        const o=this.pick(opts); return this.mc(o.q,o.a,o.d,o.e);
      },
      finger:()=>{
        const opts=[
          {q:"Dalam notasi fingerstyle (p-i-m-a), huruf 'p' merujuk ke jari apa?",a:"Jempol (bass)",d:["Telunjuk","Kelingking","Jari tengah"],e:"'p' (pulgar) = jempol, memainkan senar bass 4–6."},
          {q:"Pola bass bergantian yang dimainkan jempol disebut?",a:"Alternating bass (Travis picking)",d:["Tremolo","Sweep","Tapping"],e:"Travis picking memakai alternating bass jempol di bawah melodi."},
          {q:"Senar mana yang biasanya dimainkan jari i-m-a?",a:"Senar 1–3 (treble)",d:["Senar 4–6","Hanya senar 6","Semua senar bergantian"],e:"i-m-a memainkan senar treble; jempol menangani bass."},
          {q:"Harmonik alami paling jelas dibunyikan di fret berapa?",a:"Fret 12",d:["Fret 1","Fret 4","Fret 8"],e:"Fret 12 (juga 7 & 5) menghasilkan harmonik alami yang jelas."},
        ];
        const o=this.pick(opts); return this.mc(o.q,o.a,o.d,o.e);
      },
      theory:()=>{
        const r=Math.random();
        if(r<0.45){
          // fretboard note id
          const st=Math.floor(Math.random()*6), f=1+Math.floor(Math.random()*11);
          const name=CHROMA[midiToPc(noteAt(st,f))];
          const distract=this.shuffle(CHROMA.filter(x=>x!==name)).slice(0,3);
          return this.mc(`Nada apa di senar ${TUNING[st].label} fret ${f}?`,name,distract,
            `Senar ${st+1} terbuka = ${CHROMA[midiToPc(TUNING[st].midi)]}; naik ${f} fret menghasilkan ${name}.`);
        } else if(r<0.75){
          // interval
          const root=Math.floor(Math.random()*12);
          const iv=this.pick([{n:"perfect fifth",s:7},{n:"perfect fourth",s:5},{n:"mayor third",s:4},{n:"oktaf",s:12}]);
          const target=CHROMA[(root+iv.s)%12];
          const distract=this.shuffle(CHROMA.filter(x=>x!==target)).slice(0,3);
          return this.mc(`Interval ${iv.n} di atas ${CHROMA[root]} adalah nada apa?`,target,distract,
            `${iv.n} = ${iv.s} semitone, jadi ${CHROMA[root]} → ${target}.`);
        } else {
          const opts=[
            {q:"Triad minor dibangun dari interval apa?",a:"1 – b3 – 5",d:["1 – 3 – 5","1 – 3 – b5","1 – b3 – b5"],e:"Minor = root, third minor (b3), perfect fifth."},
            {q:"Progresi diatonik di C mayor untuk derajat I–IV–V adalah?",a:"C – F – G",d:["C – G – Am","C – Dm – Em","C – Em – Am"],e:"Derajat 1, 4, 5 di C mayor = C, F, G."},
            {q:"Rumus jarak tangga nada mayor adalah?",a:"W–W–H–W–W–W–H",d:["W–H–W–W–H–W–W","H–W–W–W–H–W–W","W–W–W–H–W–W–H"],e:"Mayor: whole-whole-half-whole-whole-whole-half."},
          ];
          const o=this.pick(opts); return this.mc(o.q,o.a,o.d,o.e);
        }
      },
      ear_chord:()=>{
        // play a chord, identify its quality (mayor/minor/dim/dom7)
        const types=[
          {label:"Mayor", iv:[0,4,7]},
          {label:"Minor", iv:[0,3,7]},
          {label:"Diminished", iv:[0,3,6]},
          {label:"Dominan 7", iv:[0,4,7,10]},
        ];
        const t=this.pick(types);
        const rootPc=Math.floor(Math.random()*12);
        const root=48+rootPc; // around C3
        const midis=t.iv.map(i=>root+i);
        const distract=this.shuffle(types.filter(x=>x.label!==t.label)).slice(0,3).map(x=>x.label);
        const q=this.mc("Dengarkan chord ini — jenis apa?",t.label,distract,
          `Ini chord ${t.label.toLowerCase()}. Dengarkan jarak antar nada: mayor terdengar 'cerah', minor 'sedih', diminished 'tegang'.`);
        q.audio=()=>Audio_.arpeggio(midis,0.16);
        return q;
      },
      ear_interval:()=>{
        // play two notes, identify the interval
        const intervals=[
          {label:"Sekonde Mayor (2)", s:2},
          {label:"Terts Mayor (3)", s:4},
          {label:"Kuart Perfect (4)", s:5},
          {label:"Kuint Perfect (5)", s:7},
          {label:"Oktaf (8)", s:12},
        ];
        const it=this.pick(intervals);
        const root=52+Math.floor(Math.random()*7); // E3..B3 area
        const distract=this.shuffle(intervals.filter(x=>x.label!==it.label)).slice(0,3).map(x=>x.label);
        const q=this.mc("Dengarkan dua nada — interval apa?",it.label,distract,
          `Jarak nada = ${it.s} semitone. Latih dengan menyanyikan kedua nada; kuint perfect (5) adalah interval pembuka 'Twinkle Twinkle'.`);
        q.audio=()=>{ Audio_.playMidi(root,{dur:0.9}); setTimeout(()=>Audio_.playMidi(root+it.s,{dur:1.1}),520); };
        return q;
      },
    };
    for(let i=0;i<10;i++) out.push(guard(gens[catId]));
    return out;
  }
};

/* ---- minimal service worker (cache-first for offline launch) ---- */
if("serviceWorker" in navigator && navigator.serviceWorker && typeof navigator.serviceWorker.register==="function"){
  const swCode=`
    const C="guitarpath-v1";
    self.addEventListener("install",e=>{self.skipWaiting();});
    self.addEventListener("activate",e=>{e.waitUntil(self.clients.claim());});
    self.addEventListener("fetch",e=>{
      if(e.request.method!=="GET") return;
      e.respondWith(
        caches.open(C).then(cache=>cache.match(e.request).then(hit=>{
          const net=fetch(e.request).then(res=>{
            // cache same-origin GETs; fonts are left to HTTP cache
            if(res && res.status===200 && e.request.url.startsWith(self.location.origin))
              cache.put(e.request,res.clone());
            return res;
          }).catch(()=>hit);
          return hit||net;
        }))
      );
    });`;
  const blob=new Blob([swCode],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{/* file:// will reject; harmless */});
}
